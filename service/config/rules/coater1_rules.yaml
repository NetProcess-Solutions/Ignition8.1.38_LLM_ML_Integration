# Deterministic business rules for Coater 1.
# Loaded into the business_rules table by scripts/seed_initial_data.py.
# Edit, then re-run the seed script to update.
#
# Condition shape:
#   all:  every clause must match
#   any:  at least one clause must match
# Clause shape:
#   { tag: <tag name as it appears in CuratedContextPackage>,
#     op:  > | >= | < | <= | == | !=,
#     value: <number, string, or boolean> }

rules:
  - rule_name: zone3_overshoot_high_speed
    line_id: coater1
    severity: warning
    category: quality_risk
    condition:
      all:
        - { tag: ZoneTemp3, op: ">", value: 425 }
        - { tag: LineSpeed, op: ">", value: 250 }
    conclusion: |
      Zone 3 temperature is above 425 F at line speed > 250 fpm. This
      combination has been associated with delamination risk on coated
      products. Recommend reviewing recent quality results and considering
      a slower line speed or zone setpoint reduction (engineer decision).

  - rule_name: coating_weight_deviation
    line_id: coater1
    severity: warning
    category: quality_risk
    condition:
      any:
        - { tag: CoatingWeightDeviationPct, op: ">", value: 5 }
        - { tag: CoatingWeightDeviationPct, op: "<", value: -5 }
    conclusion: |
      Coating weight is more than 5% off target. Inspect feed rate,
      applicator condition, and recent recipe changes.

  - rule_name: high_vibration_drive
    line_id: coater1
    severity: critical
    category: equipment_protection
    condition:
      all:
        - { tag: DriveVibration, op: ">", value: 5.0 }
    conclusion: |
      Drive vibration is above the critical threshold (5.0 mm/s).
      This is a known precursor to bearing failure. Maintenance review
      recommended.

  # ---- v2.0 additions ------------------------------------------------------

  - rule_name: oven_imbalance_zone1_zone2
    line_id: coater1
    severity: warning
    category: quality_risk
    condition:
      any:
        - { tag: ZoneTempDelta_1_2, op: ">", value: 25 }
        - { tag: ZoneTempDelta_1_2, op: "<", value: -25 }
    conclusion: |
      Zone 1 to Zone 2 temperature delta exceeds 25 F. This imbalance
      has historically correlated with off-tenter edge fold defects on
      wide product styles. Verify burner staging and recirculation fans.

  - rule_name: precoat_bubble_precursor
    line_id: coater1
    severity: warning
    category: quality_risk
    condition:
      all:
        - { tag: PrecoatViscosity, op: "<", value: 1100 }
        - { tag: PrecoatTemperature, op: ">", value: 95 }
    conclusion: |
      Precoat viscosity is low while precoat temperature is elevated.
      The bubble_precoat failure mode often appears under these
      conditions within 30 minutes. Check chiller and dilution pump.

  - rule_name: front_step_setpoint_jump
    line_id: coater1
    severity: info
    category: process_change
    condition:
      all:
        - { tag: FrontStepChangeAbs, op: ">", value: 10 }
    conclusion: |
      Front step setpoint changed by more than 10 units in the last
      production run. Subsequent quality results should be tagged for
      style-step learning until two stable runs confirm.

  - rule_name: cw_out_of_spec_persistent
    line_id: coater1
    severity: critical
    category: quality_risk
    condition:
      all:
        - { tag: CoatingWeightOutOfSpecRunCount, op: ">=", value: 3 }
    conclusion: |
      Three or more consecutive coating-weight readings are out of
      spec. Production should pause for root-cause review; this
      pattern is the dominant precursor to the cw_out_of_spec
      failure mode.
